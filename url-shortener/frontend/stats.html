<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Analytics</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <div class="header-icon">📊</div>
                <h1>URL Analytics</h1>
                <p class="subtitle">Check the performance of your short link.</p>
            </div>

            <form id="stats-form">
                <div class="input-group">
                    <label for="short-code">Short Code</label>
                    <span class="input-icon">🔍</span>
                    <input type="text" id="short-code" placeholder="e.g. abc123" required>
                </div>

                <button type="submit" id="stats-submit-btn">
                    <span class="btn-text">View Stats</span>
                    <div class="spinner hidden" id="stats-spinner"></div>
                </button>
            </form>

            <div id="stats-result" class="hidden">
                <div class="stats-grid">
                    <div class="stat-box full-width">
                        <div class="stat-icon">🔗</div>
                        <span class="stat-label">Original URL</span>
                        <a href="#" id="stat-original-url" target="_blank"
                            class="stat-value link-truncate">https://example.com/very-long-url</a>
                    </div>
                    <div class="stat-box">
                        <div class="stat-icon">📈</div>
                        <span class="stat-label">Total Clicks</span>
                        <span id="stat-clicks" class="stat-value highlight">0</span>
                    </div>
                    <div class="stat-box">
                        <div class="stat-icon">📅</div>
                        <span class="stat-label">Created At</span>
                        <span id="stat-created" class="stat-value text-sm">Oct 24, 2023</span>
                    </div>
                    <div class="stat-box full-width">
                        <div class="stat-icon">⏳</div>
                        <span class="stat-label">Expires At</span>
                        <span id="stat-expires" class="stat-value text-sm">Never</span>
                    </div>
                </div>
            </div>

            <div id="stats-error" class="hidden error-text"></div>
        </div>

        <div class="footer-links">
            <a href="index.html">← Back to Shortener</a>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
